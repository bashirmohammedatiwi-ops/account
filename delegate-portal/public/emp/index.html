<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f766e">
  <title>Edari — تجهيز الطلبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260709prepDone">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo" aria-hidden="true">E</div>
        <div>
          <p class="brand-name">Edari</p>
          <p class="brand-tag">تجهيز طلبات الشراء</p>
        </div>
      </div>
      <h1>دخول الموظفين</h1>
      <p class="login-sub">حساب موحّد لموظفي التجهيز</p>
      <form id="loginForm">
        <label class="field">
          <span>اسم المستخدم</span>
          <input type="text" id="loginUsername" autocomplete="username" value="allemp" required>
        </label>
        <label class="field">
          <span>كلمة المرور</span>
          <input type="password" id="loginPassword" autocomplete="current-password" required>
        </label>
        <p class="login-error hidden" id="loginError"></p>
        <button type="submit" class="btn primary full" id="btnLogin">دخول</button>
      </form>
    </div>
  </div>

  <div id="appShell" class="app-shell hidden">
    <header class="app-header">
      <button type="button" class="icon-btn hidden" id="btnBack" aria-label="رجوع">‹</button>
      <div class="header-copy">
        <p class="header-kicker" id="headerKicker">تجهيز الطلبات</p>
        <h1 id="screenTitle">الطلبات</h1>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="btnRefresh" aria-label="تحديث">↻</button>
        <button type="button" class="icon-btn danger" id="btnLogout" aria-label="خروج">⎋</button>
      </div>
    </header>

    <main class="app-main">
      <section class="screen active" id="screen-list">
        <div class="filters" id="orderFilters" role="tablist" aria-label="تصفية الحالة"></div>
        <p class="list-meta" id="ordersMeta">—</p>
        <div class="order-list" id="ordersList"></div>
      </section>

      <section class="screen" id="screen-detail">
        <div id="orderDetail"></div>
      </section>
    </main>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="loader-card">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>
  </div>

  <script src="app.js?v=20260709prepDone"></script>
</body>
</html>
