<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أسعار المنتجات — HAYAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>أسعار المنتجات</h1>
      <p class="subtitle">الأسعار من POS — التفاصيل والمشتريات من Edari</p>
      <div class="stats" id="stats">
        <div class="stat-card"><div class="label">المنتجات</div><div class="value" id="stat-all">—</div></div>
        <div class="stat-card"><div class="label">لها سعر POS</div><div class="value" id="stat-priced">—</div></div>
        <div class="stat-card"><div class="label">بعروض</div><div class="value stat-offer" id="stat-offers">—</div></div>
        <div class="stat-card"><div class="label">حركات مشتريات</div><div class="value" id="stat-moves">—</div></div>
      </div>
      <p class="sync-meta" id="syncMeta"></p>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <div class="search-wrap">
        <input type="search" id="search" placeholder="بحث بالاسم، الرقم، أو الباركود..." />
      </div>
      <button class="btn btn-primary" id="btn-search">بحث</button>
      <button class="btn btn-outline" id="btn-offers-only">العروض فقط</button>
    </div>

    <div class="table-wrap">
      <div id="content">
        <div class="loading">جاري تحميل المنتجات...</div>
      </div>
    </div>

    <div class="pagination" id="pagination" hidden>
      <button id="btn-prev">السابق</button>
      <span class="page-info" id="page-info"></span>
      <button id="btn-next">التالي</button>
    </div>
  </main>

  <dialog class="detail-dialog" id="detailDialog">
    <div class="detail-head">
      <h2 id="detailTitle">تفاصيل المنتج</h2>
      <button type="button" class="btn btn-outline" id="btn-close-detail">إغلاق</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
