<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f766e">
  <title>Edari — كشف حساب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <p class="login-brand-name">Edari</p>
          <p class="login-brand-tag">بوابة المندوبين</p>
        </div>
      </div>
      <h1>مرحباً بك</h1>
      <p class="login-sub">سجّل دخولك لعرض كشوف حسابات الزبائن</p>
      <form id="loginForm">
        <label class="field">
          <span class="field-label">اسم المستخدم</span>
          <input type="text" id="loginUsername" autocomplete="username" placeholder="أدخل اسم المستخدم" required>
        </label>
        <label class="field">
          <span class="field-label">كلمة المرور</span>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required>
        </label>
        <p class="login-error hidden" id="loginError"></p>
        <button type="submit" class="btn primary full" id="btnLogin">دخول</button>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="appShell" class="hidden">
    <header class="app-header">
      <div class="header-row">
        <button type="button" class="back-btn hidden" id="btnBack" aria-label="رجوع">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="header-center">
          <h1 id="screenTitle">الشجرات</h1>
          <p class="breadcrumb" id="breadcrumb"></p>
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" id="btnRefresh" title="تحديث" aria-label="تحديث">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 11-2.64-6.36M21 3v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button type="button" class="icon-btn icon-btn-danger" id="btnLogout" title="خروج" aria-label="خروج">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="header-user hidden" id="headerUser">
        <div class="user-avatar" id="userAvatar">م</div>
        <div class="user-info">
          <span class="user-name" id="userName"></span>
          <span class="user-role">مندوب مبيعات</span>
        </div>
      </div>
    </header>

    <div class="toolbar hidden" id="toolbarWrap">
      <div class="search-bar" id="searchBarWrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="branchSearch" placeholder="ابحث بالاسم أو رقم الحساب...">
      </div>
      <div class="filter-bar" id="filterBar">
        <button type="button" class="filter-chip active" data-filter="all">الكل</button>
        <button type="button" class="filter-chip" data-filter="debit">مدين</button>
        <button type="button" class="filter-chip" data-filter="credit">دائن</button>
      </div>
    </div>

    <main class="app-main">
      <!-- Trees -->
      <section class="screen active" id="screen-trees">
        <div class="welcome-banner hidden" id="welcomeBanner">
          <div class="welcome-text">
            <p class="welcome-greet">مرحباً</p>
            <p class="welcome-name" id="welcomeName"></p>
          </div>
          <div class="welcome-stat">
            <span class="welcome-stat-val" id="welcomeTreeCount">0</span>
            <span class="welcome-stat-lbl">شجرة</span>
          </div>
        </div>
        <div class="screen-meta" id="treesMeta"></div>
        <div class="cards-list" id="treesList"></div>
      </section>

      <!-- Branches -->
      <section class="screen" id="screen-branches">
        <div class="tree-context hidden" id="treeContext"></div>
        <div class="screen-meta" id="branchesMeta"></div>
        <div class="cards-list" id="branchesList"></div>
      </section>

      <!-- Statement -->
      <section class="screen" id="screen-statement">
        <div class="export-bar">
          <button type="button" class="btn-export-wa" id="btnShareStatementWa">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            مشاركة PDF واتساب
          </button>
          <button type="button" class="btn-export-pdf" id="btnExportStatementPdf">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12m0 0l4-4m-4 4L8 11M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            تصدير الكشف PDF
          </button>
        </div>
        <div class="stmt-debt-field hidden" id="stmtDebtField"></div>
        <div class="stmt-hero" id="stmtHero"></div>
        <div class="stmt-stats hidden" id="stmtStats"></div>
        <div class="stmt-table-section hidden" id="stmtTableSection">
          <div class="section-head">
            <h3>الحركات</h3>
            <span class="section-count" id="stmtLineCount"></span>
          </div>
          <div class="stmt-lines" id="stmtLines"></div>
        </div>
        <div class="stmt-totals" id="stmtTotals"></div>
      </section>

      <!-- Invoice detail -->
      <section class="screen" id="screen-invoice">
        <div class="invoice-sheet" id="invoiceSheet">
          <div class="invoice-loading hidden" id="invoiceLoading">جاري تحميل الفاتورة...</div>
          <div class="invoice-empty hidden" id="invoiceEmpty"></div>
          <div class="invoice-content hidden" id="invoiceContent">
            <div class="export-bar">
              <button type="button" class="btn-export-wa" id="btnShareInvoiceWa" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                مشاركة PDF واتساب
              </button>
              <button type="button" class="btn-export-pdf" id="btnExportInvoicePdf" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v12m0 0l4-4m-4 4L8 11M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                تصدير الفاتورة PDF
              </button>
            </div>
            <div class="invoice-hero" id="invoiceHero"></div>
            <div class="invoice-meta hidden" id="invoiceMeta"></div>
            <div class="invoice-lines-section">
              <div class="section-head">
                <h3>بنود الفاتورة</h3>
                <span class="section-count" id="invoiceLineCount"></span>
              </div>
              <div id="invoiceLines"></div>
            </div>
            <div class="invoice-totals hidden" id="invoiceTotals"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="loader-card">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>
  </div>
  <script src="app.js?v=20260609"></script>
</body>
</html>
