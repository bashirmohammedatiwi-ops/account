<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0f4f8">
  <title>Edari — كشف حساب</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">E</div>
      <h1>مرحباً</h1>
      <p>سجّل دخولك لعرض كشوف الزبائن</p>
      <form id="loginForm">
        <label>اسم المستخدم<input type="text" id="loginUsername" autocomplete="username" required></label>
        <label>كلمة المرور<input type="password" id="loginPassword" autocomplete="current-password" required></label>
        <p class="login-error hidden" id="loginError"></p>
        <button type="submit" class="btn primary full" id="btnLogin">دخول</button>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="appShell" class="hidden">
    <header class="app-header">
      <button type="button" class="back-btn hidden" id="btnBack" aria-label="رجوع">→</button>
      <div class="header-center">
        <h1 id="screenTitle">الشجرات</h1>
        <p class="breadcrumb" id="breadcrumb"></p>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="btnRefresh" title="تحديث">↻</button>
        <button type="button" class="icon-btn" id="btnLogout" title="خروج">⎋</button>
      </div>
    </header>

    <div class="search-bar hidden" id="searchBarWrap">
      <input type="search" id="branchSearch" placeholder="بحث في الفروع...">
    </div>

    <div class="filter-bar hidden" id="filterBar">
      <button type="button" class="filter-chip active" data-filter="all">الكل</button>
      <button type="button" class="filter-chip" data-filter="debit">مدين</button>
      <button type="button" class="filter-chip" data-filter="credit">دائن</button>
    </div>

    <main class="app-main">
      <!-- Trees -->
      <section class="screen active" id="screen-trees">
        <p class="screen-meta" id="treesMeta">—</p>
        <div class="cards-list" id="treesList"></div>
      </section>

      <!-- Branches -->
      <section class="screen" id="screen-branches">
        <p class="screen-meta" id="branchesMeta">—</p>
        <div class="cards-list" id="branchesList"></div>
      </section>

      <!-- Statement -->
      <section class="screen" id="screen-statement">
        <div class="stmt-hero" id="stmtHero"></div>
        <div class="stmt-stats" id="stmtStats"></div>
        <div class="stmt-table-section hidden" id="stmtTableSection">
          <div class="stmt-table-head">
            <span>مدين</span>
            <span>دائن</span>
            <span>البيان</span>
            <span>الرصيد</span>
          </div>
          <div class="stmt-lines" id="stmtLines"></div>
        </div>
        <div class="stmt-totals" id="stmtTotals"></div>
      </section>
    </main>
  </div>

  <div class="overlay hidden" id="overlay"><div class="spinner"></div></div>
  <script src="app.js"></script>
</body>
</html>
